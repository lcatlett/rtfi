name: CI
on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest pytest-cov mypy ruff
      - run: ruff check scripts/ tests/
      - run: ruff format --check scripts/ tests/
      - run: mypy scripts/rtfi_core.py scripts/hook_handler.py
      - run: pytest tests/ -v --tb=short

  no-ai-attribution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for AI attribution in commit messages
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "No base ref — skipping"
            exit 0
          fi
          PATTERNS='Co-Authored-By:.*(Claude|Anthropic|OpenAI|Copilot|ChatGPT|Gemini|noreply@anthropic)'
          FOUND=$(git log "$BASE"..HEAD --format=%B | grep -iE "$PATTERNS" || true)
          if [ -n "$FOUND" ]; then
            echo "::error::AI attribution found in commit messages. Remove these lines:"
            echo "$FOUND"
            exit 1
          fi
      - name: Check for AI attribution in tracked files
        run: |
          PATTERNS='Generated with \[Claude Code\]|Generated with \[ChatGPT\]|Generated by AI|🤖 Generated with'
          FOUND=$(grep -rE "$PATTERNS" --include="*.md" --include="*.py" --include="*.yml" . || true)
          if [ -n "$FOUND" ]; then
            echo "::error::AI attribution found in tracked files:"
            echo "$FOUND"
            exit 1
          fi
